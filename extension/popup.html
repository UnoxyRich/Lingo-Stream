<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Immersion Mode</title>
    <style>
      :root {
        --bg: #f4f8ff;
        --panel: #ffffff;
        --panel-border: #d9e3f2;
        --text: #1a2438;
        --muted: #61708c;
        --accent: #0f7a7d;
        --accent-strong: #0a5f76;
        --danger: #b63b58;
        --ok: #1d7f4f;
        --shadow: 0 14px 28px rgba(20, 46, 88, 0.14);
      }

      body {
        margin: 0;
        width: 360px;
        min-width: 360px;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI Variable", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 20%, rgba(30, 166, 164, 0.16), transparent 45%),
          radial-gradient(circle at 95% 0%, rgba(10, 95, 118, 0.2), transparent 40%),
          var(--bg);
      }

      main {
        padding: 14px;
      }

      .hero {
        margin-bottom: 12px;
      }

      .hero-title {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .hero-subtitle {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .panel {
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 12px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .field,
      .field-inline {
        margin-bottom: 12px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .field-inline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }

      select,
      input[type="range"] {
        width: 100%;
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 8px 10px;
        background: #f8fbff;
        color: var(--text);
        font-size: 13px;
      }

      input[type="range"] {
        padding: 0;
      }

      .range-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #replacementPercentage {
        flex: 1;
      }

      #replacementPercentageValue {
        min-width: 36px;
        font-size: 12px;
        font-weight: 700;
        color: var(--accent-strong);
      }

      .switch-row {
        padding: 8px 10px;
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        background: #f8fbff;
      }

      input[type="checkbox"] {
        width: 17px;
        height: 17px;
        accent-color: var(--accent);
      }

      .button-row {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 9px 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: background-color 120ms ease, transform 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        transform: none;
      }

      #saveButton {
        flex: 1;
        color: #ffffff;
        background: linear-gradient(120deg, var(--accent), var(--accent-strong));
      }

      #attachButton {
        flex: 1;
        color: var(--accent-strong);
        background: #e7f4f7;
      }

      .status {
        min-height: 18px;
        margin: 8px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .status.ok {
        color: var(--ok);
      }

      .hint {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      details {
        margin-top: 12px;
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        background: #f9fbff;
      }

      summary {
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        user-select: none;
      }

      .debug-content {
        padding: 0 12px 12px;
      }

      .debug-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0 0 10px;
      }

      #clearLogsButton {
        width: 100%;
        margin-bottom: 8px;
        color: #5a5f73;
        background: #edf2fa;
      }

      #logPanel {
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 8px;
        height: 140px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 12px;
        white-space: pre-wrap;
        background: #f2f6fd;
      }

      #logPanel.hidden {
        display: none;
      }

      @media (max-width: 420px) {
        body {
          width: 100%;
          min-width: 320px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="hero">
        <h1 class="hero-title">YouTube Immersion Mode</h1>
        <p class="hero-subtitle">Blend translated words into live captions.</p>
      </header>

      <section class="panel">
        <div class="field">
          <label for="translationProvider">Translation provider</label>
          <select id="translationProvider" name="translationProvider">
            <option value="auto">Auto fallback (Recommended)</option>
            <option value="google">Google translate endpoint</option>
            <option value="libre">LibreTranslate public mirrors</option>
            <option value="apertium">Apertium APY</option>
            <option value="mymemory">MyMemory</option>
          </select>
          <p class="hint">Auto tries multiple free providers in order and uses the first successful translation.</p>
        </div>

        <div class="field">
          <label for="targetLanguage">Target language</label>
          <select id="targetLanguage" name="targetLanguage">
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
          </select>
        </div>

        <div class="field">
          <label for="replacementPercentage">Replacement percentage</label>
          <div class="range-row">
            <input id="replacementPercentage" name="replacementPercentage" type="range" min="1" max="100" step="1" />
            <output id="replacementPercentageValue" for="replacementPercentage">5%</output>
          </div>
        </div>

        <div class="field-inline switch-row">
          <label for="enabled">Enable immersion mode</label>
          <input id="enabled" name="enabled" type="checkbox" />
        </div>

        <div class="button-row">
          <button id="saveButton" type="button">Save Settings</button>
          <button id="attachButton" type="button">Refresh Captions</button>
        </div>

        <p id="saveStatus" class="status" role="status" aria-live="polite"></p>
        <p id="runtimeStatus" class="status" role="status" aria-live="polite">Checking active tab connection...</p>

        <details>
          <summary>Debug Tools</summary>
          <div class="debug-content">
            <div class="debug-controls">
              <label for="debugEnabled">Enable debug mode</label>
              <input id="debugEnabled" name="debugEnabled" type="checkbox" />
            </div>

            <button id="clearLogsButton" type="button">Clear Logs</button>
            <div id="logPanel" aria-live="polite">Live logs appear here.</div>
          </div>
        </details>
      </section>

    </main>

    <script src="popup.js"></script>
  </body>
</html>
