<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Immersion Mode</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        min-width: 320px;
      }

      main {
        padding: 12px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }

      .field-inline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      label {
        font-size: 13px;
      }

      input,
      select,
      button {
        font-size: 13px;
      }

      .range-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #replacementPercentage {
        flex: 1;
      }

      #saveStatus {
        min-height: 18px;
        margin-top: 8px;
        font-size: 12px;
      }

      .hint {
        margin: 0;
        font-size: 12px;
        opacity: 0.8;
      }

      .debug-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
      }

      #clearLogsButton {
        margin-top: 8px;
      }

      #logPanel {
        margin-top: 8px;
        border: 1px solid #888;
        border-radius: 4px;
        padding: 8px;
        height: 140px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 12px;
        white-space: pre-wrap;
        background: rgba(127, 127, 127, 0.08);
      }

      #logPanel.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>YouTube Immersion Mode</h1>

      <div class="field">
        <label for="translationProvider">Free translation provider</label>
        <select id="translationProvider" name="translationProvider">
          <option value="libre">LibreTranslate public mirror</option>
          <option value="lingva">Lingva Translate proxy</option>
        </select>
        <p class="hint">No API key required. The extension automatically falls back if one provider is unavailable.</p>
      </div>

      <div class="field">
        <label for="targetLanguage">Target language</label>
        <select id="targetLanguage" name="targetLanguage">
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
        </select>
      </div>

      <div class="field">
        <label for="replacementPercentage">Replacement percentage</label>
        <div class="range-row">
          <input id="replacementPercentage" name="replacementPercentage" type="range" min="1" max="100" step="1" />
          <output id="replacementPercentageValue" for="replacementPercentage">5%</output>
        </div>
      </div>

      <div class="field-inline">
        <label for="enabled">Enable immersion mode</label>
        <input id="enabled" name="enabled" type="checkbox" />
      </div>

      <button id="saveButton" type="button">Save</button>
      <p id="saveStatus" role="status" aria-live="polite"></p>

      <div class="debug-controls">
        <label for="debugEnabled">Enable Debug Mode</label>
        <input id="debugEnabled" name="debugEnabled" type="checkbox" />
      </div>

      <button id="clearLogsButton" type="button">Clear Logs</button>
      <div id="logPanel" class="hidden" aria-live="polite">Live logs appear here.</div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
