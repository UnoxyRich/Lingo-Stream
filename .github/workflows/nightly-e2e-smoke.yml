name: Nightly E2E Smoke

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fixture-based E2E smoke test
        run: |
          set -o pipefail
          npm run test:e2e:smoke -- --reporter=verbose | tee nightly-e2e-smoke.log

      - name: Upload E2E smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-smoke-log
          path: nightly-e2e-smoke.log
